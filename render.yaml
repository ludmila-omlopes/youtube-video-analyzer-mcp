services:
  - type: web
    name: youtube-analyzer-mcp
    runtime: node
    plan: free
    buildCommand: npm ci && npm run build
    startCommand: npm run start:http
    healthCheckPath: /healthz
    maxShutdownDelaySeconds: 120
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: YOUTUBE_API_KEY
        sync: false
